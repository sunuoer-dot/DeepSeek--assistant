<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>DeepSeek · 自动模型获取</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #e8ecf2; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #e8ecf2; margin: 0; padding: 0; }
        .chat-container { max-width: 100%; width: 100%; background: #ffffff; border-radius: 0; box-shadow: none; overflow: hidden; display: flex; flex-direction: column; height: 100vh; min-height: 100vh; position: relative; }
        .chat-header { padding: 14px 18px 10px; background: white; border-bottom: 0.5px solid #eef2f6; }
        .header-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .header-row h1 { font-size: 20px; font-weight: 600; background: linear-gradient(135deg, #0066cc, #00a3e0); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .current-save-badge { font-size: 11px; background: #eef2ff; padding: 5px 12px; border-radius: 30px; color: #0066cc; font-weight: 500; }
        .api-status { font-size: 10px; color: #2c7a4d; background: #e8f5e9; padding: 4px 10px; border-radius: 30px; }
        .api-status.error { background: #ffebee; color: #d14545; }
        .messages-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; -webkit-overflow-scrolling: touch; }
        .message { display: flex; flex-direction: column; max-width: 85%; }
        .user-message { align-self: flex-end; }
        .bot-message { align-self: flex-start; }
        .bubble { padding: 12px 16px; border-radius: 22px; font-size: 15px; line-height: 1.45; word-break: break-word; white-space: pre-wrap; }
        .user-message .bubble { background: #0066cc; color: white; border-bottom-right-radius: 5px; }
        .bot-message .bubble { background: #f0f2f5; color: #1e293b; border-bottom-left-radius: 5px; }
        .message-time { font-size: 10px; color: #8e9aaf; margin-top: 4px; margin-left: 10px; }
        .typing-indicator { display: flex; gap: 4px; padding: 10px 14px; background: #f0f2f5; border-radius: 24px; width: fit-content; }
        .typing-indicator span { width: 8px; height: 8px; background: #8e9aaf; border-radius: 50%; animation: blink 1.4s infinite; }
        @keyframes blink { 0%,60%,100% { opacity: 0.3; } 30% { opacity: 1; transform: translateY(-3px); } }
        .input-area { padding: 12px 16px 20px; background: white; border-top: 0.5px solid #eef2f6; display: flex; gap: 8px; align-items: flex-end; }
        .input-wrapper { flex: 1; background: #f8fafc; border-radius: 30px; border: 1px solid #e2e8f0; display: flex; align-items: center; padding: 4px 6px 4px 16px; }
        .input-wrapper:focus-within { border-color: #0066cc; background: white; }
        #userInput { flex: 1; border: none; background: transparent; padding: 10px 0; font-size: 16px; font-family: inherit; resize: none; max-height: 100px; outline: none; }
        .icon-btn { background: none; border: none; width: 42px; height: 42px; border-radius: 42px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 22px; transition: 0.15s; color: #6c86a3; }
        .icon-btn:active { background: #eef2f6; transform: scale(0.94); }
        .send-btn { background: #0066cc; color: white; }
        .send-btn:active { background: #004c99; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; visibility: hidden; opacity: 0; transition: 0.2s; }
        .modal-overlay.show { visibility: visible; opacity: 1; }
        .modal-menu { background: white; border-radius: 28px; width: 90%; max-width: 360px; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .modal-header { padding: 18px 20px 12px; font-weight: 600; font-size: 18px; border-bottom: 0.5px solid #eef2f6; position: sticky; top: 0; background: white; }
        .modal-item { padding: 14px 20px; display: flex; align-items: center; gap: 14px; font-size: 15px; border-bottom: 0.5px solid #f0f2f5; cursor: pointer; }
        .modal-item:active { background: #f5f7fb; }
        .close-modal { margin: 16px; background: #f0f2f5; text-align: center; padding: 12px; border-radius: 40px; color: #6c86a3; cursor: pointer; }
        .save-slot { padding: 14px 20px; border-bottom: 0.5px solid #f0f2f5; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .save-slot:active { background: #f5f7fb; }
        .save-info { flex: 1; }
        .save-name { font-weight: 500; font-size: 15px; margin-bottom: 4px; }
        .save-meta { font-size: 11px; color: #8e9aaf; }
        .save-actions { display: flex; gap: 12px; }
        .save-actions button { background: none; border: none; font-size: 18px; cursor: pointer; padding: 6px; }
        .current-badge { background: #0066cc; color: white; font-size: 10px; padding: 2px 8px; border-radius: 30px; }
        .param-row { margin-bottom: 16px; }
        .param-row label { font-size: 13px; font-weight: 500; display: block; margin-bottom: 6px; }
        .param-row input[type="range"] { width: 100%; height: 4px; -webkit-appearance: none; background: #cbd5e1; border-radius: 4px; }
        .param-row input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: #0066cc; border-radius: 50%; cursor: pointer; }
        .value-display { font-size: 12px; color: #6c86a3; text-align: right; margin-top: 4px; }
        select { width: 100%; padding: 10px; border-radius: 30px; border: 1px solid #ddd; font-size: 14px; background: white; }
        .footer-note { font-size: 10px; text-align: center; color: #acb8cf; padding: 8px; border-top: 0.5px solid #eef2f6; }
        #fileInput { display: none; }
        .back-btn { cursor: pointer; color: #0066cc; }
        .loading-models { font-size: 12px; color: #0066cc; padding: 4px 8px; background: #eef2ff; border-radius: 30px; display: inline-block; margin-top: 6px; }
        .model-refresh { background: none; border: none; font-size: 12px; color: #0066cc; margin-left: 6px; cursor: pointer; }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <div class="header-row">
            <h1>📖 多存档 · 文游助手</h1>
            <div style="display: flex; gap: 8px; align-items: center;">
                <span class="current-save-badge" id="currentSaveBadge">存档 1</span>
                <div id="apiStatusBadge" class="api-status">⚡ 未配置</div>
            </div>
        </div>
    </div>

    <div class="messages-area" id="messagesArea">
        <div class="message bot-message">
            <div class="bubble">✨ 多存档文游助手！<br>点击💾可管理多个存档。<br>模型列表会从 DeepSeek 官方自动获取！<br>开始你的旅程吧～</div>
            <div class="message-time">刚刚</div>
        </div>
    </div>

    <div class="input-area">
        <button class="icon-btn" id="attachBtn" title="上传文件">➕</button>
        <div class="input-wrapper">
            <textarea id="userInput" rows="1" placeholder="输入你的选择..."></textarea>
        </div>
        <button class="icon-btn" id="settingsMenuBtn" title="存档管理">💾</button>
        <button class="icon-btn send-btn" id="sendBtn">➤</button>
    </div>
    <div class="footer-note">💾 点击💾管理存档 | 模型列表自动同步官方</div>
</div>

<input type="file" id="fileInput" accept=".txt,.md,.json,.csv,text/plain">

<div id="mainModal" class="modal-overlay">
    <div class="modal-menu">
        <div class="modal-header">📋 主菜单</div>
        <div class="modal-item" id="saveManagerBtn"><span>💾</span> 存档管理 (保存/加载)</div>
        <div class="modal-item" id="paramsBtn"><span>🎛️</span> 对话参数设置</div>
        <div class="modal-item" id="apiConfigBtn"><span>🔑</span> API Key 配置</div>
        <div class="close-modal" id="closeMainModal">关闭</div>
    </div>
</div>

<div id="saveModal" class="modal-overlay">
    <div class="modal-menu" style="max-width: 400px;">
        <div class="modal-header"><span class="back-btn" id="backFromSaveBtn">← 返回</span> 存档管理</div>
        <div id="saveSlotsList" style="max-height: 60vh; overflow-y: auto;"></div>
        <div class="close-modal" id="closeSaveModal">关闭</div>
    </div>
</div>

<div id="paramsModal" class="modal-overlay">
    <div class="modal-menu">
        <div class="modal-header"><span class="back-btn" id="backFromParamsBtn">← 返回</span> 参数设置</div>
        <div style="padding: 16px;">
            <div class="param-row"><label>🌡️ 温度 (创意度)</label><input type="range" id="tempSlider" min="0" max="1.2" step="0.05" value="0.7"><div class="value-display"><span id="tempVal">0.70</span></div></div>
            <div class="param-row"><label>📏 最大回复长度</label><input type="range" id="maxTokenSlider" min="200" max="4096" step="100" value="2048"><div class="value-display"><span id="maxTokenVal">2048</span> tokens</div></div>
            <div class="param-row"><label>🎲 Top-P</label><input type="range" id="topPSlider" min="0.5" max="1.0" step="0.02" value="0.95"><div class="value-display"><span id="topPVal">0.95</span></div></div>
            <div class="param-row">
                <label>🧠 模型 <span id="modelRefreshHint" class="model-refresh" style="font-size:11px;">🔄 刷新列表</span></label>
                <select id="modelSelect">
                    <option value="">加载中...</option>
                </select>
                <div id="modelFetchStatus" class="loading-models" style="display:none;">正在从官方获取模型列表...</div>
            </div>
        </div>
        <div class="close-modal" id="closeParamsModal">关闭</div>
    </div>
</div>

<div id="apiModal" class="modal-overlay">
    <div class="modal-menu">
        <div class="modal-header"><span class="back-btn" id="backFromApiBtn">← 返回</span> API Key</div>
        <div style="padding: 16px;">
            <input type="password" id="apiKeyInput" placeholder="sk-..." style="width:100%; padding:12px; border-radius:30px; border:1px solid #ddd; margin-bottom:12px;">
            <button id="saveApiKeyBtn" style="width:100%; background:#0066cc; border:none; padding:12px; border-radius:30px; color:white;">保存</button>
        </div>
        <div class="close-modal" id="closeApiModal">关闭</div>
    </div>
</div>

<script>
    const DEEPSEEK_API_URL = "https://api.deepseek.com/v1/chat/completions";
    const DEEPSEEK_MODELS_URL = "https://api.deepseek.com/v1/models";
    
    const MAX_SAVES = 9;
    let currentSaveSlot = parseInt(localStorage.getItem('current_save_slot') || '1');
    let saves = {};
    let currentApiKey = localStorage.getItem('deepseek_api_key') || '';
    let isWaiting = false;
    let conversationHistory = [];
    let availableModels = []; // 存储从API获取的模型列表
    
    let settings = {
        temperature: parseFloat(localStorage.getItem('ds_temp') || '0.7'),
        max_tokens: parseInt(localStorage.getItem('ds_max_tokens') || '2048'),
        top_p: parseFloat(localStorage.getItem('ds_top_p') || '0.95'),
        model: localStorage.getItem('ds_model') || 'deepseek-chat'
    };
    
    // DOM 元素
    const messagesArea = document.getElementById('messagesArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const attachBtn = document.getElementById('attachBtn');
    const fileInput = document.getElementById('fileInput');
    const settingsMenuBtn = document.getElementById('settingsMenuBtn');
    const apiStatusBadge = document.getElementById('apiStatusBadge');
    const currentSaveBadge = document.getElementById('currentSaveBadge');
    
    const mainModal = document.getElementById('mainModal');
    const saveModal = document.getElementById('saveModal');
    const paramsModal = document.getElementById('paramsModal');
    const apiModal = document.getElementById('apiModal');
    const modelSelect = document.getElementById('modelSelect');
    const modelFetchStatus = document.getElementById('modelFetchStatus');
    
    // 模型名称映射（给用户友好的显示）
    function getModelDisplayName(modelId) {
        const map = {
            'deepseek-chat': '💬 deepseek-chat (日常对话)',
            'deepseek-coder': '💻 deepseek-coder (编程专家)',
            'deepseek-v3': '🚀 deepseek-v3 (最新大模型)',
            'deepseek-r1': '🧠 deepseek-r1 (深度推理)',
            'deepseek-v2.5': '⚡ deepseek-v2.5 (稳定版)'
        };
        return map[modelId] || `🤖 ${modelId}`;
    }
    
    // 从官方API获取模型列表
    async function fetchAvailableModels() {
        if (!currentApiKey) {
            console.log('未配置API Key，无法获取模型列表');
            return false;
        }
        
        if (modelFetchStatus) modelFetchStatus.style.display = 'block';
        
        try {
            const response = await fetch(DEEPSEEK_MODELS_URL, {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${currentApiKey}`
                }
            });
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            const data = await response.json();
            
            if (data.data && Array.isArray(data.data)) {
                // 过滤出可用的聊天模型（通常 id 包含 chat 或 coder 等）
                availableModels = data.data.filter(m => 
                    m.id && (m.id.includes('chat') || m.id.includes('coder') || m.id.includes('v3') || m.id.includes('r1'))
                ).map(m => m.id);
                
                // 如果没有过滤到，就用所有模型
                if (availableModels.length === 0) {
                    availableModels = data.data.map(m => m.id);
                }
                
                // 更新下拉框
                updateModelSelect();
                
                // 保存到本地缓存
                localStorage.setItem('cached_models', JSON.stringify(availableModels));
                localStorage.setItem('cached_models_time', Date.now());
                
                if (modelFetchStatus) modelFetchStatus.style.display = 'none';
                return true;
            }
        } catch (error) {
            console.error('获取模型列表失败:', error);
            // 使用缓存的模型列表
            const cached = localStorage.getItem('cached_models');
            if (cached) {
                try {
                    availableModels = JSON.parse(cached);
                    updateModelSelect();
                } catch(e) {}
            }
            if (modelFetchStatus) modelFetchStatus.style.display = 'none';
            return false;
        }
        if (modelFetchStatus) modelFetchStatus.style.display = 'none';
        return false;
    }
    
    // 更新下拉框
    function updateModelSelect() {
        if (!modelSelect) return;
        
        modelSelect.innerHTML = '';
        
        if (availableModels.length === 0) {
            // 后备模型列表
            const fallbackModels = ['deepseek-chat', 'deepseek-coder', 'deepseek-r1'];
            availableModels = fallbackModels;
        }
        
        for (const modelId of availableModels) {
            const option = document.createElement('option');
            option.value = modelId;
            option.textContent = getModelDisplayName(modelId);
            if (settings.model === modelId) {
                option.selected = true;
            }
            modelSelect.appendChild(option);
        }
        
        // 如果当前选中的模型不在列表中，选择第一个
        let found = false;
        for (const modelId of availableModels) {
            if (settings.model === modelId) { found = true; break; }
        }
        if (!found && availableModels.length > 0) {
            settings.model = availableModels[0];
            localStorage.setItem('ds_model', settings.model);
            modelSelect.value = settings.model;
        }
    }
    
    // 刷新模型列表
    async function refreshModels() {
        if (!currentApiKey) {
            addMessageToUI("⚠️ 请先配置 API Key 才能获取模型列表", false);
            return;
        }
        await fetchAvailableModels();
        addMessageToUI(`✅ 已从官方获取 ${availableModels.length} 个可用模型`, false);
    }
    
    // 存档相关函数
    function loadAllSaves() {
        let allSaves = localStorage.getItem('all_saves_data');
        if (allSaves) {
            try { saves = JSON.parse(allSaves); } catch(e) { saves = {}; }
        }
        for (let i = 1; i <= MAX_SAVES; i++) {
            if (!saves[i]) saves[i] = { name: `存档 ${i}`, history: [], lastTime: null, msgCount: 0 };
        }
        saveAllSavesToStorage();
    }
    
    function saveAllSavesToStorage() { localStorage.setItem('all_saves_data', JSON.stringify(saves)); }
    
    function saveCurrentConversationToSlot() {
        if (saves[currentSaveSlot]) {
            saves[currentSaveSlot].history = JSON.parse(JSON.stringify(conversationHistory));
            saves[currentSaveSlot].lastTime = new Date().toISOString();
            saves[currentSaveSlot].msgCount = conversationHistory.length;
            saveAllSavesToStorage();
        }
    }
    
    function loadSlot(slotId) {
        if (!saves[slotId]) saves[slotId] = { name: `存档 ${slotId}`, history: [], lastTime: null, msgCount: 0 };
        currentSaveSlot = slotId;
        localStorage.setItem('current_save_slot', currentSaveSlot);
        conversationHistory = JSON.parse(JSON.stringify(saves[slotId].history));
        if (!conversationHistory || conversationHistory.length === 0) {
            conversationHistory = [{ role: 'assistant', content: `✨ 欢迎来到「${saves[slotId].name}」\n开始你的冒险吧！` }];
            saves[slotId].history = JSON.parse(JSON.stringify(conversationHistory));
            saveAllSavesToStorage();
        }
        renderMessagesFromHistory();
        updateCurrentBadge();
    }
    
    function updateCurrentBadge() { currentSaveBadge.innerText = saves[currentSaveSlot]?.name || `存档 ${currentSaveSlot}`; }
    
    function renameSave(slotId, newName) {
        if (saves[slotId]) { saves[slotId].name = newName.substring(0, 20); saveAllSavesToStorage(); if (currentSaveSlot === slotId) updateCurrentBadge(); renderSaveSlotsList(); }
    }
    
    function newGameInSlot(slotId) {
        saves[slotId].history = [{ role: 'assistant', content: `✨ 「${saves[slotId].name}」的新旅程开始了！` }];
        saves[slotId].lastTime = new Date().toISOString();
        saves[slotId].msgCount = 1;
        saveAllSavesToStorage();
        if (currentSaveSlot === slotId) { conversationHistory = JSON.parse(JSON.stringify(saves[slotId].history)); renderMessagesFromHistory(); }
        renderSaveSlotsList();
    }
    
    function renderSaveSlotsList() {
        const container = document.getElementById('saveSlotsList');
        if (!container) return;
        container.innerHTML = '';
        for (let i = 1; i <= MAX_SAVES; i++) {
            const save = saves[i];
            const isCurrent = (currentSaveSlot === i);
            const div = document.createElement('div');
            div.className = 'save-slot';
            div.innerHTML = `<div class="save-info" onclick="window.selectSave(${i})"><div class="save-name">${escapeHtml(save.name)} ${isCurrent ? '<span class="current-badge">当前</span>' : ''}</div><div class="save-meta">${save.msgCount || 0} 条消息 · ${save.lastTime ? new Date(save.lastTime).toLocaleDateString() : '新存档'}</div></div><div class="save-actions"><button onclick="window.renameSavePrompt(${i})" title="重命名">✏️</button><button onclick="window.newGameInSlot(${i})" title="新游戏">🔄</button><button onclick="window.selectSave(${i})" title="加载">📂</button></div>`;
            container.appendChild(div);
        }
    }
    
    window.selectSave = function(slotId) { if (isWaiting) return; saveCurrentConversationToSlot(); loadSlot(slotId); saveModal.classList.remove('show'); mainModal.classList.remove('show'); };
    window.renameSavePrompt = function(slotId) { const newName = prompt(`为「${saves[slotId].name}」起个新名字:`, saves[slotId].name); if (newName && newName.trim()) renameSave(slotId, newName.trim()); };
    window.newGameInSlot = function(slotId) { if (confirm(`确定要重置「${saves[slotId].name}」吗？`)) newGameInSlot(slotId); };
    
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    function renderMessagesFromHistory() {
        messagesArea.innerHTML = '';
        conversationHistory.forEach(msg => { messagesArea.appendChild(createMessageElement(msg.content, msg.role === 'user')); });
        scrollToBottom();
    }
    
    function createMessageElement(content, isUser) {
        const div = document.createElement('div');
        div.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerText = content;
        div.appendChild(bubble);
        const timeSpan = document.createElement('div');
        timeSpan.className = 'message-time';
        timeSpan.innerText = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
        div.appendChild(timeSpan);
        return div;
    }
    
    function addMessageToUI(content, isUser) {
        const el = createMessageElement(content, isUser);
        messagesArea.appendChild(el);
        scrollToBottom();
        conversationHistory.push({ role: isUser ? 'user' : 'assistant', content: content });
        if (conversationHistory.length > 80) conversationHistory = conversationHistory.slice(-80);
        saveCurrentConversationToSlot();
    }
    
    function scrollToBottom() { messagesArea.scrollTo({ top: messagesArea.scrollHeight, behavior: 'smooth' }); }
    
    function showTyping() { const ind = document.createElement('div'); ind.className = 'message bot-message'; ind.id = 'typingIndicator'; ind.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`; messagesArea.appendChild(ind); scrollToBottom(); }
    function hideTyping() { document.getElementById('typingIndicator')?.remove(); }
    
    async function callDeepSeek(userMsg) {
        if (!currentApiKey) throw new Error('未设置API Key');
        let apiMessages = conversationHistory.slice(-14).map(m => ({ role: m.role, content: m.content }));
        apiMessages.push({ role: 'user', content: userMsg });
        const resp = await fetch(DEEPSEEK_API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${currentApiKey}` },
            body: JSON.stringify({ model: settings.model, messages: apiMessages, temperature: settings.temperature, max_tokens: settings.max_tokens, top_p: settings.top_p, stream: false })
        });
        if (!resp.ok) { let err = `HTTP ${resp.status}`; try { const e = await resp.json(); err = e.error?.message || err; } catch(e) {} throw new Error(err); }
        const data = await resp.json();
        return data.choices[0].message.content;
    }
    
    async function handleSend(text) {
        if (isWaiting || !text.trim()) return;
        if (!currentApiKey) { addMessageToUI("⚠️ 请先点击💾 → API Key 配置", false); return; }
        addMessageToUI(text, true);
        userInput.value = '';
        userInput.style.height = 'auto';
        isWaiting = true;
        showTyping();
        try {
            const reply = await callDeepSeek(text);
            hideTyping();
            addMessageToUI(reply, false);
        } catch (err) { hideTyping(); addMessageToUI(`❌ 错误: ${err.message}`, false); if (err.message.includes('401')) updateApiBadge(); }
        finally { isWaiting = false; }
    }
    
    attachBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!currentApiKey) { addMessageToUI("⚠️ 请先配置 API Key", false); return; }
        const reader = new FileReader();
        reader.onload = async (ev) => {
            const content = ev.target.result;
            addMessageToUI(`📎 上传了文件: ${file.name}`, true);
            const prompt = `用户上传了文件「${file.name}」，内容如下：\n${content}\n\n请阅读并理解这个文件。`;
            isWaiting = true; showTyping();
            try { const reply = await callDeepSeek(prompt); hideTyping(); addMessageToUI(`📄 已读取「${file.name}」\n\n${reply}`, false); }
            catch(err) { hideTyping(); addMessageToUI(`处理文件失败: ${err.message}`, false); }
            finally { isWaiting = false; }
            fileInput.value = '';
        };
        reader.readAsText(file, 'UTF-8');
    });
    
    function updateApiBadge() {
        if (currentApiKey) { apiStatusBadge.innerText = '✅ API就绪'; apiStatusBadge.classList.remove('error'); }
        else { apiStatusBadge.innerText = '⚠️ 未配置Key'; apiStatusBadge.classList.add('error'); }
    }
    
    function loadSettingsToUI() {
        document.getElementById('tempSlider').value = settings.temperature;
        document.getElementById('tempVal').innerText = settings.temperature.toFixed(2);
        document.getElementById('maxTokenSlider').value = settings.max_tokens;
        document.getElementById('maxTokenVal').innerText = settings.max_tokens;
        document.getElementById('topPSlider').value = settings.top_p;
        document.getElementById('topPVal').innerText = settings.top_p.toFixed(2);
        if (modelSelect) modelSelect.value = settings.model;
    }
    
    function saveSettingsFromUI() {
        settings.temperature = parseFloat(document.getElementById('tempSlider').value);
        settings.max_tokens = parseInt(document.getElementById('maxTokenSlider').value);
        settings.top_p = parseFloat(document.getElementById('topPSlider').value);
        if (modelSelect) settings.model = modelSelect.value;
        localStorage.setItem('ds_temp', settings.temperature);
        localStorage.setItem('ds_max_tokens', settings.max_tokens);
        localStorage.setItem('ds_top_p', settings.top_p);
        localStorage.setItem('ds_model', settings.model);
    }
    
    function hideAllModals() { mainModal.classList.remove('show'); saveModal.classList.remove('show'); paramsModal.classList.remove('show'); apiModal.classList.remove('show'); }
    
    settingsMenuBtn.addEventListener('click', () => { saveCurrentConversationToSlot(); mainModal.classList.add('show'); });
    document.getElementById('closeMainModal').addEventListener('click', hideAllModals);
    document.getElementById('closeSaveModal').addEventListener('click', hideAllModals);
    document.getElementById('closeParamsModal').addEventListener('click', hideAllModals);
    document.getElementById('closeApiModal').addEventListener('click', hideAllModals);
    document.getElementById('saveManagerBtn').addEventListener('click', () => { renderSaveSlotsList(); mainModal.classList.remove('show'); saveModal.classList.add('show'); });
    document.getElementById('paramsBtn').addEventListener('click', () => { loadSettingsToUI(); mainModal.classList.remove('show'); paramsModal.classList.add('show'); });
    document.getElementById('apiConfigBtn').addEventListener('click', () => { document.getElementById('apiKeyInput').value = currentApiKey; mainModal.classList.remove('show'); apiModal.classList.add('show'); });
    document.getElementById('backFromSaveBtn').addEventListener('click', () => { saveModal.classList.remove('show'); mainModal.classList.add('show'); });
    document.getElementById('backFromParamsBtn').addEventListener('click', () => { saveSettingsFromUI(); paramsModal.classList.remove('show'); mainModal.classList.add('show'); });
    document.getElementById('backFromApiBtn').addEventListener('click', () => { apiModal.classList.remove('show'); mainModal.classList.add('show'); });
    document.getElementById('saveApiKeyBtn').addEventListener('click', async () => { 
        let newKey = document.getElementById('apiKeyInput').value.trim(); 
        if (newKey) { 
            currentApiKey = newKey; 
            localStorage.setItem('deepseek_api_key', currentApiKey); 
            updateApiBadge(); 
            alert('✅ API Key 已保存'); 
            hideAllModals();
            // 获取模型列表
            await fetchAvailableModels();
        } 
    });
    
    // 刷新模型按钮
    if (document.getElementById('modelRefreshHint')) {
        document.getElementById('modelRefreshHint').addEventListener('click', () => { refreshModels(); });
    }
    
    sendBtn.addEventListener('click', () => handleSend(userInput.value));
    userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(userInput.value); } });
    userInput.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 100) + 'px'; });
    
    // 初始化
    loadAllSaves();
    loadSlot(currentSaveSlot);
    updateApiBadge();
    loadSettingsToUI();
    
    // 如果有 API Key，自动获取模型列表
    if (currentApiKey) {
        fetchAvailableModels();
    }
</script>
</body>
</html>
